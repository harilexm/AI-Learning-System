server {
    listen 80;
    server_name localhost;

    # The location of our compiled Vue app
    root /usr/share/nginx/html;
    index index.html;

    # This is the crucial part for SPAs.
    # It tells Nginx to try the requested URL first, then try it as a directory,
    # and if all else fails, fall back to serving index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Improve caching for static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public";
    }
}